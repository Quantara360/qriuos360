upstream php_api {
    server php-api:80;
    keepalive 16;
}

upstream laravel {
    server laravel:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # ── Static frontend (built React/Vite SPA) ────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (videos for 3D generation)
    client_max_body_size 100M;

    # Gzip — gzip_vary is critical: without it, a CDN/proxy caches the
    # uncompressed version and serves it to all browsers, inflating JS download times.
    gzip on;
    gzip_comp_level 6;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml application/x-font-ttf font/woff font/woff2;
    gzip_min_length 1024;

    # Reduce disk I/O for static files by caching open file descriptors in memory
    open_file_cache          max=2000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_errors   on;

    # Efficient static file delivery
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Cache static assets
    location ~* \.(js|css|woff2?|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Dish 360 / banner video uploads — served with CORS + range support ──
    # Must come BEFORE the generic /dishcraft-api/ block (more specific match).
    location ~* ^/dishcraft-api/uploads/.*\.(mp4|webm|mov)$ {
        # Strip /dishcraft-api prefix so PHP receives /uploads/video.mp4
        rewrite ^/dishcraft-api(/.*)$ $1 break;
        proxy_pass         http://php_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # CORS — allows canvas drawImage() from any origin without tainting
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # Range requests — browser needs this to seek before full download
        add_header Accept-Ranges bytes always;

        # Cache aggressively (filenames contain a random hash, so safe)
        add_header Cache-Control "public, max-age=31536000, immutable" always;

        proxy_read_timeout 120s;
    }

    # ── PHP API (/dishcraft-api/ → php-api container root) ────
    location /dishcraft-api/ {
        proxy_pass         http://php_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Laravel (/dishcraft-backend/ → laravel container root) ─
    location /dishcraft-backend/ {
        proxy_pass         http://laravel/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── SPA fallback ─────────────────────────────────────────
    # index.html: no-cache so browsers revalidate on every visit.
    # With ETag (nginx default), repeat visitors get a 304 (empty body,
    # near-zero TTFB) instead of re-downloading the full HTML.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
