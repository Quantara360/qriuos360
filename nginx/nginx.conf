upstream php_api {
    server php-api:80;
    keepalive 16;
}

upstream laravel {
    server laravel:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # ── Static frontend (built React/Vite SPA) ────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (videos for 3D generation)
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|woff2?|ttf|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── PHP API (/dishcraft-api/ → php-api container root) ────
    location /dishcraft-api/ {
        proxy_pass         http://php_api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Laravel (/dishcraft-backend/ → laravel container root) ─
    location /dishcraft-backend/ {
        proxy_pass         http://laravel/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── SPA fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
