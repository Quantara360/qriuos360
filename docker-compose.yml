# ============================================================
#  DishCraft — Docker Compose
#  Copy .env.example to .env and fill in values before running.
#  docker compose up --build -d
# ============================================================

services:

  # ── Nginx: serves built frontend + reverse-proxies both backends ──────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - php-api
      - laravel
    restart: unless-stopped
    networks:
      - dishcraft

  # ── PHP API (legacy REST layer) ───────────────────────────────────────────
  php-api:
    build:
      context: C:/xampp/htdocs/dishcraft-api
    environment:
      DB_HOST: mysql
      DB_NAME: dishcraft
      DB_USER: dishcraft
      DB_PASS: ${DB_PASSWORD}
      ALLOWED_ORIGINS: ${APP_URL:-http://localhost}
    volumes:
      - uploads:/uploads
      - php-sessions:/var/lib/php/sessions
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dishcraft

  # ── Laravel backend (primary feature API) ────────────────────────────────
  laravel:
    build:
      context: C:/xampp/htdocs/dishcraft-backend
    environment:
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost}
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dishcraft
      DB_USERNAME: dishcraft
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: file
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - laravel-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dishcraft

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: dishcraft
      MYSQL_USER: dishcraft
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - dishcraft

volumes:
  uploads:
  mysql-data:
  laravel-storage:
  php-sessions:

networks:
  dishcraft:
    driver: bridge
